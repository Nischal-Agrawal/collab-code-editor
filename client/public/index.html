<!DOCTYPE html>
<html>
<head>
  <title>Collab Editor Pro</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<!-- JOIN -->
<div id="joinScreen" class="join-screen">
  <div class="join-card">
    <h2>Join Room</h2>
    <input id="username" placeholder="Username">
    <input id="roomId" placeholder="Room ID">
    <button id="joinBtn">Join</button>
  </div>
</div>

<!-- APP -->
<div id="editorScreen" class="app" style="display:none;">

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="title">⚡ Collab Editor</div>

    <div class="tabs">
      <div class="tab active">main.js</div>
      <div class="tab">index.html</div>
    </div>

    <div class="controls">
      <select id="language">
        <option value="javascript">JavaScript</option>
        <option value="python">Python</option>
        <option value="cpp">C++</option>
      </select>

      <button id="themeToggle">🌙</button>
      <button id="copyRoom">Copy</button>
      <button id="runCode">Run</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h3>Users</h3>
      <ul id="users"></ul>

      <div id="typing"></div>
    </div>

    <!-- EDITOR -->
    <div class="editor-container">
      <div id="editor"></div>

      <div class="output">
        <h4>Output</h4>
        <pre id="output"></pre>
      </div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script type="module" src="./js/main.js"></script>

</body>
</html>
